services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
    restart: unless-stopped
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/conekt_ads_internal
      CLIENT_URL: http://localhost:5173
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-your_google_oauth_client_id}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_ALLOWED_DOMAIN: ${GOOGLE_ALLOWED_DOMAIN:-conektads.com}
      GEOCODING_PROVIDER: ${GEOCODING_PROVIDER:-nominatim}
      MAPBOX_ACCESS_TOKEN: ${MAPBOX_ACCESS_TOKEN:-}
      GOOGLE_DRIVE_API_KEY: ${GOOGLE_DRIVE_API_KEY:-}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      CLOUDINARY_UPLOAD_FOLDER: ${CLOUDINARY_UPLOAD_FOLDER:-inventory}
      JWT_SECRET: ${JWT_SECRET:-replace_this_secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      COOKIE_NAME: ${COOKIE_NAME:-conekt_ads_token}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      MCP_ENABLED: ${MCP_ENABLED:-false}
      MCP_AUTH_MODE: ${MCP_AUTH_MODE:-token}
      MCP_BASE_URL: ${MCP_BASE_URL:-http://localhost:5000}
      MCP_ACCESS_TOKEN: ${MCP_ACCESS_TOKEN:-}
      MCP_ACTOR_EMAIL: ${MCP_ACTOR_EMAIL:-admin@conektads.com}
      MCP_SHARED_SCOPES: ${MCP_SHARED_SCOPES:-platform:read campaigns:write plans:write operations:write documents:write uploads:write shares:write crm:write inventory:write reports:read}
      MCP_MAX_UPLOAD_BYTES: ${MCP_MAX_UPLOAD_BYTES:-6291456}
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "5000:5000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:5000/api/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  client:
    build:
      context: ./client
      args:
        VITE_API_URL: /api
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-your_google_oauth_client_id}
        VITE_MAPBOX_ACCESS_TOKEN: ${MAPBOX_ACCESS_TOKEN:-}
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "5173:80"

volumes:
  mongo_data:
