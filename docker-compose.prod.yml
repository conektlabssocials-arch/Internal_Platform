services:
  server:
    image: ajmalca/internal-platform-server:latest
    container_name: internal-platform-server
    restart: unless-stopped
    env_file:
      - ./server/.env
    ports:
      - "5001:5000"
    networks:
      - internal-platform-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:5000/api/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  client:
    image: ajmalca/internal-platform-client:latest
    container_name: internal-platform-client
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "5174:80"
    networks:
      - internal-platform-network

networks:
  internal-platform-network:
    driver: bridge